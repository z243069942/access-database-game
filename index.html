<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access数据库闯关挑战 - 河南对口招生备考</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei',Arial,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}

/* 首页 */
#home-screen{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:20px}
.game-title{text-align:center;margin-bottom:30px}
.game-title h1{font-size:2.2em;color:#e94560;text-shadow:0 0 20px rgba(233,69,96,0.5);margin-bottom:8px}
.game-title h2{font-size:1.1em;color:#a8dadc;margin-bottom:4px}
.game-title p{font-size:0.9em;color:#888;margin-top:8px}
.exam-info{background:rgba(255,255,255,0.05);border:1px solid rgba(168,218,220,0.3);border-radius:12px;padding:16px 24px;margin-bottom:24px;text-align:center;max-width:480px}
.exam-info .badge{background:#e94560;color:#fff;font-size:0.75em;padding:3px 10px;border-radius:20px;margin-bottom:8px;display:inline-block}
.exam-info p{color:#a8dadc;font-size:0.9em;line-height:1.6}
.chapters-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:520px;width:100%;margin-bottom:24px}
.chapter-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px;cursor:pointer;transition:all .3s;text-align:center}
.chapter-card:hover{background:rgba(233,69,96,0.15);border-color:#e94560;transform:translateY(-2px)}
.chapter-card.locked{opacity:0.4;cursor:not-allowed}
.chapter-card.completed{border-color:#4caf50;background:rgba(76,175,80,0.1)}
.chapter-card.completed::after{content:'✓';color:#4caf50;font-weight:bold;margin-left:4px}
.chapter-icon{font-size:2em;margin-bottom:6px}
.chapter-name{font-size:0.85em;color:#a8dadc;font-weight:bold;margin-bottom:3px}
.chapter-desc{font-size:0.72em;color:#888;line-height:1.4}
.chapter-stars{color:#ffd700;font-size:0.8em;margin-top:4px}
.btn-primary{background:#e94560;color:#fff;border:none;padding:12px 36px;font-size:1em;border-radius:25px;cursor:pointer;transition:all .3s;font-weight:bold}
.btn-primary:hover{background:#c73652;transform:scale(1.05)}
.btn-secondary{background:transparent;color:#a8dadc;border:1px solid #a8dadc;padding:10px 28px;font-size:0.9em;border-radius:25px;cursor:pointer;transition:all .3s;margin:0 6px}
.btn-secondary:hover{background:rgba(168,218,220,0.1)}
.stats-bar{display:flex;gap:20px;margin-bottom:20px}
.stat-item{text-align:center}
.stat-value{font-size:1.4em;color:#e94560;font-weight:bold}
.stat-label{font-size:0.72em;color:#888}

/* 关卡选择 */
#level-screen{background:#16213e;padding:20px;align-items:flex-start;padding-top:30px}
.level-header{text-align:center;margin-bottom:24px;width:100%}
.level-header h2{color:#e94560;font-size:1.5em;margin-bottom:4px}
.level-header p{color:#888;font-size:0.85em}
.levels-list{width:100%;max-width:560px;margin:0 auto}
.level-item{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px 18px;margin-bottom:10px;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:14px}
.level-item:hover:not(.locked){background:rgba(233,69,96,0.1);border-color:#e94560}
.level-item.locked{opacity:0.4;cursor:not-allowed}
.level-item.completed{border-color:#4caf50}
.level-num{width:36px;height:36px;border-radius:50%;background:#e94560;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:0.9em;flex-shrink:0}
.level-num.completed-num{background:#4caf50}
.level-num.locked-num{background:#555}
.level-info{flex:1}
.level-info h4{font-size:0.9em;color:#a8dadc;margin-bottom:2px}
.level-info p{font-size:0.76em;color:#888}
.level-stars{color:#ffd700;font-size:0.8em}
.back-btn{background:transparent;color:#888;border:1px solid #555;padding:8px 20px;border-radius:20px;cursor:pointer;margin-top:16px;font-size:0.85em;transition:all .3s}
.back-btn:hover{color:#a8dadc;border-color:#a8dadc}

/* 游戏界面 */
#game-screen{background:#0f3460;padding:16px;align-items:flex-start;padding-top:20px}
.game-header{width:100%;max-width:640px;margin:0 auto 16px;display:flex;align-items:center;gap:12px}
.game-progress{flex:1}
.progress-bar{background:rgba(255,255,255,0.1);border-radius:10px;height:8px;overflow:hidden}
.progress-fill{background:#e94560;height:100%;border-radius:10px;transition:width .4s}
.progress-text{font-size:0.75em;color:#888;margin-top:4px}
.game-score{text-align:right;min-width:80px}
.score-val{font-size:1.3em;color:#ffd700;font-weight:bold}
.score-lab{font-size:0.7em;color:#888}
.timer-box{background:rgba(233,69,96,0.15);border:1px solid rgba(233,69,96,0.3);border-radius:8px;padding:6px 12px;text-align:center;min-width:60px}
.timer-num{font-size:1.2em;color:#e94560;font-weight:bold}
.timer-lab{font-size:0.65em;color:#888}
.timer-box.urgent{animation:pulse 0.5s infinite alternate}
@keyframes pulse{to{background:rgba(233,69,96,0.35)}}

.question-card{width:100%;max-width:640px;margin:0 auto;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:20px 24px}
.q-type-badge{background:#e94560;color:#fff;font-size:0.72em;padding:2px 10px;border-radius:10px;margin-bottom:10px;display:inline-block}
.q-type-badge.judge{background:#0f6e56}
.q-type-badge.fill{background:#185fa5}
.q-type-badge.multi{background:#854f0b}
.q-type-badge.sort{background:#a0522d}
.q-text{font-size:1em;color:#e0e0e0;line-height:1.7;margin-bottom:18px}
.q-code{background:#0a0a1a;border-radius:8px;padding:12px;font-family:Consolas,monospace;font-size:0.88em;color:#a8dadc;margin:10px 0;border-left:3px solid #e94560;line-height:1.8}
.options-list{display:flex;flex-direction:column;gap:10px}
.option-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:12px 16px;text-align:left;color:#e0e0e0;cursor:pointer;transition:all .25s;font-size:0.9em;line-height:1.5}
.option-btn:hover:not(:disabled){background:rgba(168,218,220,0.1);border-color:#a8dadc}
.option-btn.selected{background:rgba(233,69,96,0.15);border-color:#e94560;color:#fff}
.option-btn.correct{background:rgba(76,175,80,0.2);border-color:#4caf50;color:#a5d6a7}
.option-btn.wrong{background:rgba(233,69,96,0.2);border-color:#e94560;color:#ef9a9a}
.option-btn:disabled{cursor:default}
.fill-input{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:10px 14px;color:#e0e0e0;font-size:0.95em;outline:none;transition:border .25s}
.fill-input:focus{border-color:#a8dadc}
.fill-input.correct-fill{border-color:#4caf50;background:rgba(76,175,80,0.1)}
.fill-input.wrong-fill{border-color:#e94560;background:rgba(233,69,96,0.1)}
.confirm-btn{margin-top:14px;background:#e94560;color:#fff;border:none;padding:10px 28px;border-radius:20px;cursor:pointer;font-size:0.9em;transition:all .3s}
.confirm-btn:hover{background:#c73652}
.feedback-box{margin-top:14px;padding:12px 16px;border-radius:8px;font-size:0.88em;line-height:1.6}
.feedback-box.correct-fb{background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.3);color:#a5d6a7}
.feedback-box.wrong-fb{background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.2);color:#ef9a9a}
.next-btn{margin-top:12px;background:#0f6e56;color:#fff;border:none;padding:10px 28px;border-radius:20px;cursor:pointer;font-size:0.9em;width:100%;transition:all .3s}
.next-btn:hover{background:#1d9e75}

/* 结算 */
#result-screen{background:linear-gradient(135deg,#1a1a2e,#0f3460);padding:20px}
.result-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:30px 36px;text-align:center;max-width:420px;width:100%}
.result-icon{font-size:3.5em;margin-bottom:12px}
.result-title{font-size:1.5em;color:#e94560;margin-bottom:6px}
.result-sub{font-size:0.9em;color:#888;margin-bottom:20px}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.rs-item{background:rgba(255,255,255,0.05);border-radius:8px;padding:10px}
.rs-val{font-size:1.4em;color:#ffd700;font-weight:bold}
.rs-lab{font-size:0.72em;color:#888;margin-top:2px}
.stars-display{font-size:2em;color:#ffd700;margin-bottom:18px;letter-spacing:4px}
.result-msg{font-size:0.88em;color:#a8dadc;line-height:1.6;margin-bottom:20px;padding:10px;background:rgba(168,218,220,0.05);border-radius:8px}
.result-btns{display:flex;flex-direction:column;gap:8px}

/* 知识点速览 */
#knowledge-screen{background:#16213e;padding:20px;align-items:flex-start;padding-top:20px;overflow-y:auto}
.knowledge-container{width:100%;max-width:640px;margin:0 auto}
.kn-header{margin-bottom:20px}
.kn-header h2{color:#e94560;font-size:1.4em;margin-bottom:4px}
.kn-header p{color:#888;font-size:0.85em}
.kn-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.kn-tab{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:6px 14px;cursor:pointer;font-size:0.8em;color:#888;transition:all .3s}
.kn-tab.active{background:#e94560;border-color:#e94560;color:#fff}
.kn-content{display:none}
.kn-content.active{display:block}
.kn-section{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px;margin-bottom:12px}
.kn-section h4{color:#a8dadc;font-size:0.95em;margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:8px}
.kn-list{list-style:none}
.kn-list li{font-size:0.85em;color:#ccc;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);line-height:1.6}
.kn-list li:last-child{border:none}
.kn-list li::before{content:'›';color:#e94560;margin-right:8px;font-weight:bold}
.kn-table{width:100%;border-collapse:collapse;font-size:0.82em}
.kn-table th{background:rgba(233,69,96,0.2);color:#a8dadc;padding:8px 10px;text-align:left;font-weight:500}
.kn-table td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.06);color:#ccc;vertical-align:top}
.kn-table tr:hover td{background:rgba(255,255,255,0.03)}
.highlight{color:#ffd700;font-weight:bold}
.code-inline{background:#0a0a1a;padding:2px 6px;border-radius:4px;font-family:Consolas,monospace;font-size:0.85em;color:#a8dadc}

/* SQL代码排序题型 */
.sort-container{margin-top:10px}
.sort-instruction{font-size:0.85em;color:#a8dadc;margin-bottom:12px;padding:8px 12px;background:rgba(168,218,220,0.08);border-radius:8px;border-left:3px solid #e94560}
.sort-fragments{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.sort-frag-btn{background:rgba(233,69,96,0.15);border:1px solid rgba(233,69,96,0.4);border-radius:8px;padding:8px 12px;color:#e0e0e0;cursor:pointer;font-size:0.82em;transition:all .25s;font-family:Consolas,monospace;line-height:1.5}
.sort-frag-btn:hover:not(:disabled){background:rgba(233,69,96,0.25);border-color:#e94560}
.sort-frag-btn.used{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.1);color:#555;cursor:default;text-decoration:line-through}
.sort-frag-btn:disabled{cursor:not-allowed;opacity:0.5}
.sort-answer-area{min-height:60px;background:rgba(255,255,255,0.03);border:2px dashed rgba(255,255,255,0.15);border-radius:10px;padding:12px;margin-bottom:14px;transition:all .3s}
.sort-answer-placeholder{color:#555;font-size:0.85em;text-align:center;padding:10px}
.sort-answer-list{display:flex;flex-direction:column;gap:6px}
.sort-answer-item{display:flex;align-items:center;gap:10px;background:rgba(15,110,86,0.15);border:1px solid rgba(15,110,86,0.3);border-radius:8px;padding:8px 12px;cursor:pointer;transition:all .2s;font-size:0.85em;font-family:Consolas,monospace}
.sort-answer-item:hover{background:rgba(233,69,96,0.15);border-color:rgba(233,69,96,0.4)}
.sort-order{background:#e94560;color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:0.8em;font-weight:bold;flex-shrink:0}
.sort-frag-text{flex:1;color:#e0e0e0;line-height:1.5}
.sort-remove{color:#e94560;font-weight:bold;cursor:pointer;padding:0 4px;font-size:1.1em}
.sort-remove:hover{color:#ff6b6b}
.sort-btn-area{display:flex;gap:10px;justify-content:center}

/* 通用 */
.hidden{display:none!important}
.flex-center{display:flex;align-items:center;justify-content:center;gap:10px}
.mt-10{margin-top:10px}
.mt-16{margin-top:16px}
</style>
</head>
<body>

<!-- 首页 -->
<div id="home-screen" class="screen active">
  <div class="game-title">
    <h1>Access 数据库闯关挑战</h1>
    <h2>河南对口招生专业课备考</h2>
    <p>数据库应用基础 · 系统复习 · 2027考试专用</p>
  </div>
  <div class="exam-info">
    <div class="badge">2027年河南对口招生考试</div>
    <p>涵盖《数据库应用基础Access》全部核心考点<br>表设计 · 查询 · SQL语言 · 窗体 · 报表</p>
  </div>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-value" id="total-score">0</div><div class="stat-label">总积分</div></div>
    <div class="stat-item"><div class="stat-value" id="total-completed">0</div><div class="stat-label">完成关卡</div></div>
    <div class="stat-item"><div class="stat-value" id="total-stars">0</div><div class="stat-label">获得星星</div></div>
  </div>
  <div class="chapters-grid" id="chapters-grid"></div>
  <div class="flex-center">
    <button class="btn-primary" onclick="showScreen('level-screen');showChapterLevels(0)">开始答题</button>
    <button class="btn-secondary" onclick="showScreen('knowledge-screen')">知识速览</button>
  </div>
</div>

<!-- 关卡选择 -->
<div id="level-screen" class="screen">
  <div class="level-header">
    <h2 id="chapter-title">第一章</h2>
    <p id="chapter-subtitle">选择关卡开始挑战</p>
  </div>
  <div class="levels-list" id="levels-list"></div>
  <button class="back-btn" onclick="showScreen('home-screen')">← 返回主页</button>
</div>

<!-- 游戏界面 -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div>
      <button class="back-btn" style="margin:0;padding:6px 14px;font-size:0.8em" onclick="confirmExit()">退出</button>
    </div>
    <div class="game-progress">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-text" id="progress-text">第 1 / 10 题</div>
    </div>
    <div class="timer-box" id="timer-box">
      <div class="timer-num" id="timer-num">60</div>
      <div class="timer-lab">秒</div>
    </div>
    <div class="game-score">
      <div class="score-val" id="game-score-val">0</div>
      <div class="score-lab">分</div>
    </div>
  </div>
  <div class="question-card" id="question-card">
    <div id="q-type-badge" class="q-type-badge">单选题</div>
    <div class="q-text" id="q-text"></div>
    <div id="q-code-block" class="q-code hidden"></div>
    <div id="options-container"></div>
    <div id="feedback-container"></div>
  </div>
</div>

<!-- 结算界面 -->
<div id="result-screen" class="screen">
  <div class="result-card">
    <div class="result-icon" id="result-icon">🏆</div>
    <div class="result-title" id="result-title">太棒了！</div>
    <div class="result-sub" id="result-sub">你已通关本关卡</div>
    <div class="stars-display" id="result-stars">★★★</div>
    <div class="result-stats">
      <div class="rs-item"><div class="rs-val" id="rs-correct">0</div><div class="rs-lab">答对</div></div>
      <div class="rs-item"><div class="rs-val" id="rs-score">0</div><div class="rs-lab">得分</div></div>
      <div class="rs-item"><div class="rs-val" id="rs-acc">0%</div><div class="rs-lab">正确率</div></div>
    </div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-btns">
      <button class="btn-primary" onclick="retryLevel()">再次挑战</button>
      <button class="btn-secondary" onclick="showScreen('level-screen')">返回关卡</button>
      <button class="btn-secondary" onclick="showScreen('home-screen')">返回主页</button>
    </div>
  </div>
</div>

<!-- 知识点速览 -->
<div id="knowledge-screen" class="screen" style="display:none;flex-direction:column;align-items:center">
  <div class="knowledge-container">
    <div class="kn-header">
      <h2>知识点速览</h2>
      <p>Access数据库核心考点 · 对口招生必备</p>
    </div>
    <div class="kn-tabs" id="kn-tabs"></div>
    <div id="kn-contents"></div>
    <button class="back-btn" style="margin-top:10px" onclick="showScreen('home-screen')">← 返回主页</button>
  </div>
</div>

<script src="questions.js"></script>
<script src="knowledge.js"></script>
<script src="game.js"></script>
</body>
</html>
